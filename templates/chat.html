<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Chatbot - AI Health Assistant</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --bg-color: #f8fbfd;
            --chat-bg: #ffffff;
            --user-msg-bg: #3a7bd5;
            --bot-msg-bg: #f1f4f8;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--chat-bg);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .chat-header {
            background: var(--primary-gradient);
            padding: 25px 35px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.2);
        }

        .header-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .bot-avatar {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            backdrop-filter: blur(5px);
        }

        .chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-image: radial-gradient(#3a7bd510 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 1rem;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: var(--user-msg-bg);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(58, 123, 213, 0.2);
        }

        .bot-message {
            align-self: flex-start;
            background: var(--bot-msg-bg);
            color: var(--text-color);
            border-bottom-left-radius: 4px;
            border: 1px solid #e1e8ef;
        }

        .chat-input-area {
            padding: 25px 35px;
            background: white;
            border-top: 1px solid #eee;
        }

        .input-group {
            background: #f1f4f8;
            padding: 5px;
            border-radius: 15px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .input-group:focus-within {
            border-color: #3a7bd5;
            background: white;
            box-shadow: 0 0 0 4px rgba(58, 123, 213, 0.1);
        }

        .form-control {
            background: transparent;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            box-shadow: none !important;
        }

        .send-btn {
            background: var(--primary-gradient);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            color: white;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .typing-indicator {
            display: none;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 10px;
            padding-left: 20px;
        }

        .dot-pulse {
            position: relative;
            left: -9999px;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #3a7bd5;
            color: #3a7bd5;
            box-shadow: 9999px 0 0 0 #3a7bd5;
            animation: dotPulse 1.5s infinite linear;
        }

        @keyframes dotPulse {
            0% { box-shadow: 9999px 0 0 -5px #3a7bd5; }
            30% { box-shadow: 9999px 0 0 2px #3a7bd5; }
            60%, 100% { box-shadow: 9999px 0 0 -5px #3a7bd5; }
        }

        /* Scrollbar styling */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-info">
                <div class="bot-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div>
                    <h5 class="m-0 fw-bold">Medical AI Assistant</h5>
                    <small class="opacity-75"><i class="fas fa-circle text-success me-1" style="font-size: 8px;"></i> Personalized Care</small>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-link text-white p-0"><i class="fas fa-ellipsis-v"></i></button>
            </div>
        </div>

        <div class="chat-messages" id="messageArea">
            <div class="message bot-message">
                Hello! I am your AI medical assistant. How can I help you today?
            </div>
        </div>

        <div id="typing" class="typing-indicator mx-4">
            AI is thinking <span class="dot-pulse"></span>
        </div>

        <div class="chat-input-area">
            <form id="messageForm" class="d-flex gap-2">
                <div class="input-group flex-grow-1">
                    <input type="text" id="text" name="msg" class="form-control" placeholder="Describe your symptoms or ask a medical question..." required autocomplete="off">
                </div>
                <button type="submit" id="send" class="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            $("#messageForm").on("submit", function(event) {
                event.preventDefault();
                const date = new Date();
                const hour = date.getHours();
                const minute = date.getMinutes();
                const str_time = hour + ":" + (minute < 10 ? '0' + minute : minute);
                const rawText = $("#text").val();

                const userHtml = `<div class="message user-message">${rawText}<div style="font-size: 10px; opacity: 0.7; text-align: right; margin-top: 5px;">${str_time}</div></div>`;
                
                $("#text").val("");
                $("#messageArea").append(userHtml);
                scrollToBottom();

                // Show typing indicator
                $("#typing").show();

                $.ajax({
                    data: {
                        msg: rawText,
                    },
                    type: "POST",
                    url: "/get",
                }).done(function(data) {
                    $("#typing").hide();
                    const botHtml = `<div class="message bot-message">${data}<div style="font-size: 10px; opacity: 0.7; margin-top: 5px;">${str_time}</div></div>`;
                    $("#messageArea").append(botHtml);
                    scrollToBottom();
                });
            });

            function scrollToBottom() {
                const messageArea = document.getElementById("messageArea");
                messageArea.scrollTop = messageArea.scrollHeight;
            }
        });
    </script>
</body>
</html>
